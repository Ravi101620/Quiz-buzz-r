<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Buzz Quiz</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Outfit', sans-serif; }
    html, body { height: 100%; margin: 0; padding: 0; }
    
    @keyframes slideUp { 
      from { opacity: 0; transform: translateY(30px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    @keyframes popIn { 
      from { opacity: 0; transform: scale(0.8); } 
      to { opacity: 1; transform: scale(1); } 
    }
    @keyframes confetti1 { 
      0% { transform: translate(0,0) rotate(0deg); opacity: 1; } 
      100% { transform: translate(-80px,-200px) rotate(360deg); opacity: 0; } 
    }
    @keyframes confetti2 { 
      0% { transform: translate(0,0) rotate(0deg); opacity: 1; } 
      100% { transform: translate(60px,-180px) rotate(-300deg); opacity: 0; } 
    }
    @keyframes confetti3 { 
      0% { transform: translate(0,0) rotate(0deg); opacity: 1; } 
      100% { transform: translate(20px,-220px) rotate(200deg); opacity: 0; } 
    }
    
    .slide-up { animation: slideUp 0.5s ease-out forwards; }
    .pop-in { animation: popIn 0.4s ease-out forwards; }
    .option-btn { transition: all 0.2s ease; cursor: pointer; }
    .option-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    .option-btn:active:not(:disabled) { transform: translateY(0); }
    .progress-fill { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .confetti span:nth-child(1) { animation: confetti1 1s ease-out forwards; }
    .confetti span:nth-child(2) { animation: confetti2 1.1s ease-out forwards; }
    .confetti span:nth-child(3) { animation: confetti3 0.9s ease-out forwards; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: #0f172a;"><!-- Start Screen -->
   <div id="start-screen" class="flex items-center justify-center h-full px-4">
    <div class="text-center slide-up max-w-lg w-full">
     <div class="text-6xl mb-6">
      🧠
     </div>
     <h1 class="text-4xl md:text-5xl font-800 mb-3" style="color: #f0abfc;">Brain Buzz Quiz</h1>
     <p class="text-lg mb-8" style="color: #94a3b8;">Test your knowledge with 10 fun questions!</p><button onclick="startQuiz()" class="option-btn px-10 py-4 rounded-2xl text-lg font-700 text-white" style="background: #7c3aed;"> Start Quiz </button>
    </div>
   </div><!-- Quiz Screen -->
   <div id="quiz-screen" class="hidden flex flex-col items-center justify-center h-full px-4 py-8">
    <div class="max-w-2xl w-full"><!-- Progress -->
     <div class="flex items-center justify-between mb-2"><span id="q-counter" class="text-sm font-600" style="color: #94a3b8;">Question 1 / 10</span> <span id="score-display" class="text-sm font-600" style="color: #f0abfc;">Score: 0</span>
     </div>
     <div class="w-full h-2 rounded-full mb-8" style="background: #1e293b;">
      <div id="progress-bar" class="progress-fill h-full rounded-full" style="background: #7c3aed; width: 10%;"></div>
     </div><!-- Question Card -->
     <div id="question-card" class="rounded-3xl p-8 md:p-10 slide-up" style="background: #1e293b;">
      <h2 id="question-text" class="text-xl md:text-2xl font-700 mb-8" style="color: #f1f5f9;"></h2>
      <div id="options-container" class="grid gap-3"></div>
      <div id="feedback-area" class="mt-6 hidden">
       <p id="feedback-text" class="font-600 text-lg mb-4"></p><button onclick="nextQuestion()" class="option-btn px-8 py-3 rounded-xl font-600 text-white" style="background: #7c3aed;"> Next → </button>
      </div>
     </div>
    </div>
   </div><!-- Results Screen -->
   <div id="results-screen" class="hidden flex items-center justify-center h-full px-4">
    <div class="text-center pop-in max-w-lg w-full">
     <div class="confetti text-4xl mb-2 relative inline-block"><span class="absolute">🎉</span> <span class="absolute">✨</span> <span class="absolute">🌟</span>
     </div>
     <div id="result-emoji" class="text-7xl mb-4"></div>
     <h2 class="text-3xl md:text-4xl font-800 mb-2" style="color: #f0abfc;">Quiz Complete!</h2>
     <p id="result-score" class="text-xl mb-2 font-600" style="color: #f1f5f9;"></p>
     <p id="result-message" class="text-lg mb-8" style="color: #94a3b8;"></p>
     <div class="rounded-2xl p-6 mb-8" style="background: #1e293b;">
      <div id="result-bars" class="flex items-end justify-center gap-1 h-32 mb-3"></div>
      <p class="text-xs" style="color: #64748b;">Your answer breakdown</p>
     </div><button onclick="restartQuiz()" class="option-btn px-10 py-4 rounded-2xl text-lg font-700 text-white" style="background: #7c3aed;"> Play Again </button>
    </div>
   </div>
  </div>
  <script>
    const questions = [
      { q: "What planet is known as the Red Planet?", options: ["Venus", "Mars", "Jupiter", "Saturn"], answer: 1 },
      { q: "How many bones are in the adult human body?", options: ["186", "206", "226", "256"], answer: 1 },
      { q: "Which ocean is the largest?", options: ["Atlantic", "Indian", "Arctic", "Pacific"], answer: 3 },
      { q: "What is the chemical symbol for gold?", options: ["Go", "Gd", "Au", "Ag"], answer: 2 },
      { q: "In what year did the Titanic sink?", options: ["1905", "1912", "1918", "1923"], answer: 1 },
      { q: "Which country has the most natural lakes?", options: ["USA", "Brazil", "Canada", "Russia"], answer: 2 },
      { q: "What is the smallest prime number?", options: ["0", "1", "2", "3"], answer: 2 },
      { q: "Who painted the Mona Lisa?", options: ["Michelangelo", "Da Vinci", "Raphael", "Donatello"], answer: 1 },
      { q: "What gas do plants primarily absorb?", options: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"], answer: 2 },
      { q: "Which animal has the longest lifespan?", options: ["Elephant", "Blue Whale", "Giant Tortoise", "Bowhead Whale"], answer: 3 }
    ];

    let current = 0, score = 0, answered = false, answers = [];

    function startQuiz() {
      current = 0;
      score = 0;
      answers = [];
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('results-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      showQuestion();
    }

    function showQuestion() {
      answered = false;
      const q = questions[current];
      
      document.getElementById('q-counter').textContent = `Question ${current + 1} / 10`;
      document.getElementById('score-display').textContent = `Score: ${score}`;
      document.getElementById('progress-bar').style.width = `${(current + 1) * 10}%`;
      document.getElementById('question-text').textContent = q.q;
      document.getElementById('feedback-area').classList.add('hidden');

      const container = document.getElementById('options-container');
      container.innerHTML = '';
      
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn w-full text-left px-6 py-4 rounded-xl font-500 border-2 transition-all';
        btn.style.background = 'transparent';
        btn.style.borderColor = '#334155';
        btn.style.color = '#f1f5f9';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(i);
        container.appendChild(btn);
      });
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;
      
      const q = questions[current];
      const correct = idx === q.answer;
      if (correct) score++;
      answers.push(correct);

      const btns = document.getElementById('options-container').children;
      for (let i = 0; i < btns.length; i++) {
        btns[i].disabled = true;
        if (i === q.answer) {
          btns[i].style.borderColor = '#22c55e';
          btns[i].style.background = 'rgba(34,197,94,0.15)';
          btns[i].style.color = '#22c55e';
        } else if (i === idx && !correct) {
          btns[i].style.borderColor = '#ef4444';
          btns[i].style.background = 'rgba(239,68,68,0.15)';
          btns[i].style.color = '#ef4444';
        } else {
          btns[i].style.opacity = '0.4';
        }
      }

      const fb = document.getElementById('feedback-area');
      const fbText = document.getElementById('feedback-text');
      fb.classList.remove('hidden');
      fbText.textContent = correct ? "✅ Correct!" : `❌ The answer was: ${q.options[q.answer]}`;
      fbText.style.color = correct ? '#22c55e' : '#ef4444';

      if (current === questions.length - 1) {
        document.getElementById('next-btn').textContent = 'See Results →';
      }
    }

    function nextQuestion() {
      current++;
      if (current >= questions.length) {
        showResults();
      } else {
        const card = document.getElementById('question-card');
        card.classList.remove('slide-up');
        void card.offsetWidth;
        card.classList.add('slide-up');
        showQuestion();
      }
    }

    function showResults() {
      document.getElementById('quiz-screen').classList.add('hidden');
      const rs = document.getElementById('results-screen');
      rs.classList.remove('hidden');

      const pct = Math.round((score / 10) * 100);
      document.getElementById('result-score').textContent = `You scored ${score} out of 10 (${pct}%)`;
      document.getElementById('result-emoji').textContent = pct >= 80 ? '🏆' : pct >= 50 ? '👏' : '💪';
      document.getElementById('result-message').textContent = 
        pct >= 80 ? 'Amazing! You really know your stuff!' : 
        pct >= 50 ? 'Nice job! Room to improve though.' : 
        'Keep learning — you\'ll get there!';

      const bars = document.getElementById('result-bars');
      bars.innerHTML = '';
      answers.forEach((correct, i) => {
        const bar = document.createElement('div');
        bar.className = 'rounded-t';
        bar.style.width = '20px';
        bar.style.height = correct ? '100%' : '30%';
        bar.style.background = correct ? '#22c55e' : '#ef4444';
        bar.style.opacity = '0.8';
        bar.style.transition = `height 0.5s ease ${i * 0.08}s`;
        bar.title = `Q${i + 1}: ${correct ? 'Correct' : 'Wrong'}`;
        bars.appendChild(bar);
      });
    }

    function restartQuiz() {
      document.getElementById('results-screen').classList.add('hidden');
      document.getElementById('start-screen').classList.remove('hidden');
    }
  </script>
