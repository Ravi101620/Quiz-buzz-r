<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Buzz Quiz</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
</head>

<body class="min-h-screen" style="font-family: Outfit, sans-serif;">

  <div id="app" class="min-h-screen w-full overflow-auto" style="background: #0f172a;">

    <!-- Start Screen -->
    <div id="start-screen" class="flex items-center justify-center min-h-screen px-4">
      <div class="text-center slide-up max-w-lg w-full">

        <div class="text-6xl mb-6">
          🧠
        </div>

        <h1 class="text-4xl md:text-5xl font-extrabold mb-3" style="color: #f0abfc;">
          Brain Buzz Quiz
        </h1>

        <p class="text-lg mb-8" style="color: #94a3b8;">
          Test your knowledge with 10 fun questions!
        </p>

        <button
          onclick="startQuiz()"
          class="option-btn px-10 py-4 rounded-2xl text-lg font-bold text-white"
          style="background: #7c3aed;"
        >
          Start Quiz
        </button>

      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen"
      class="hidden flex-col items-center justify-center min-h-screen px-4 py-8">

      <div class="max-w-2xl w-full">

        <!-- Progress -->
        <div class="flex items-center justify-between mb-2">

          <span id="q-counter"
            class="text-sm font-semibold"
            style="color: #94a3b8;">
            Question 1 / 10
          </span>

          <span id="score-display"
            class="text-sm font-semibold"
            style="color: #f0abfc;">
            Score: 0
          </span>

        </div>

        <div class="w-full h-2 rounded-full mb-8"
          style="background: #1e293b;">

          <div id="progress-bar"
            class="progress-fill h-full rounded-full"
            style="background: #7c3aed; width: 10%;">
          </div>

        </div>

        <!-- Question Card -->
        <div id="question-card"
          class="rounded-3xl p-8 md:p-10 slide-up"
          style="background: #1e293b;">

          <h2 id="question-text"
            class="text-xl md:text-2xl font-bold mb-8"
            style="color: #f1f5f9;">
          </h2>

          <div id="options-container" class="grid gap-3"></div>

          <div id="feedback-area" class="mt-6 hidden">

            <p id="feedback-text"
              class="font-semibold text-lg mb-4">
            </p>

            <button
              id="next-btn"
              onclick="nextQuestion()"
              class="option-btn px-8 py-3 rounded-xl font-semibold text-white"
              style="background: #7c3aed;"
            >
              Next →
            </button>

          </div>
        </div>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen"
      class="hidden items-center justify-center min-h-screen px-4">

      <div class="text-center pop-in max-w-lg w-full">

        <div class="confetti text-4xl mb-2 relative inline-block">
          <span class="absolute">🎉</span>
          <span class="absolute">✨</span>
          <span class="absolute">🌟</span>
        </div>

        <div id="result-emoji" class="text-7xl mb-4"></div>

        <h2 class="text-3xl md:text-4xl font-extrabold mb-2"
          style="color: #f0abfc;">
          Quiz Complete!
        </h2>

        <p id="result-score"
          class="text-xl mb-2 font-semibold"
          style="color: #f1f5f9;">
        </p>

        <p id="result-message"
          class="text-lg mb-8"
          style="color: #94a3b8;">
        </p>

        <div class="rounded-2xl p-6 mb-8"
          style="background: #1e293b;">

          <div id="result-bars"
            class="flex items-end justify-center gap-1 h-32 mb-3">
          </div>

          <p class="text-xs" style="color: #64748b;">
            Your answer breakdown
          </p>
        </div>

        <button
          onclick="restartQuiz()"
          class="option-btn px-10 py-4 rounded-2xl text-lg font-bold text-white"
          style="background: #7c3aed;"
        >
          Play Again
        </button>

      </div>
    </div>
  </div>

  <!-- Load JS after HTML -->
  <script src="/script.js"></script>

</body>
</html>
